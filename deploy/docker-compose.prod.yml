services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler}
      POSTGRES_DB: job_scheduler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d job_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://scheduler:${POSTGRES_PASSWORD:-scheduler}@postgres:5432/job_scheduler
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      NODE_ENV: production
      TYPEORM_SYNC: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://scheduler:${POSTGRES_PASSWORD:-scheduler}@postgres:5432/job_scheduler
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      WORKER_ID: worker-1
      SCHEDULER_ALGORITHM: heap
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
